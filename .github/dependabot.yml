version: 2
updates:
    - package-ecosystem: 'bun'
      directory: '/'
      schedule:
          interval: 'weekly'
      open-pull-requests-limit: 5
      groups:
          dev-dependencies:
              dependency-type: 'development'
    - package-ecosystem: 'docker'
      directory: '/'
      schedule:
          interval: 'weekly'
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
