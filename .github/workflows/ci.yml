name: CI

# Tags are deliberately not built. A release tag points at a commit already on main, which this
# workflow has built under `refs/heads/main`; building it again under `refs/tags/vX.Y.Z` ran the
# whole suite twice on a byte-identical tree. Worse, the two near-simultaneous pushes contended in
# CodeQL's default-setup concurrency and cancelled its analysis outright, so tagged commits shipped
# without a completed security scan. The release workflow reads this run's result by commit SHA.
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# Workflow-level least-privilege token. Jobs opt into additional permissions only when
# their non-package outputs require them.
permissions:
    contents: read

concurrency:
    cancel-in-progress: true
    group: ci-${{ github.ref }}

jobs:
    quality:
        name: Quality Checks
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version-file: package.json

            # Cache only Bun's content-addressed download cache. Never cache node_modules: a job
            # that dies mid-install can save an incomplete tree in the post step.
            - name: Cache Bun dependencies
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ~/.bun/install/cache
                  key: bun-dl-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-dl-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # One canonical entrypoint keeps hosted quality checks aligned with local QC.
            # Template drift and fleet checks are explicit no-ops when their external
            # comparison inputs are absent in the isolated CI checkout.
            #
            # This subsumes the former separate `Build` job: smoke.json's qc mode runs
            # `bun run build` (backend + frontend) and then the checks that read its
            # output, in that order, so they no longer need a job of their own —
            #   - verify-minification  reads frontend/dist for the bundle size budget
            #   - check:critical-path  guards the SHAPE of the first load, not just its
            #     size: a regression moving the React runtime out of a preloaded chunk
            #     costs a round trip while leaving total bytes unchanged, which a size
            #     budget cannot detect
            #   - check:api-types      reads the built OpenAPI spec
            # Duplicating them in a second job only bought a second full build.
            - name: Canonical quality gate
              run: bun run smoke:qc

    runtime:
        name: Runtime Verification
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: quality
        permissions:
            contents: read
            security-events: write

        # Exercises the project's primary RUNTIME verification path, which the
        # static `quality`/`build` jobs do not cover. Brings the full production
        # image up via the docker-local compose (docker/start.sh auto-migrates
        # and seeds a usable SQLite database on first boot, so the server starts
        # in CI with no manual DB setup) and runs `bun run smoke:docker-local`,
        # which crawls every discoverable route with Puppeteer (scripts/crawltest.ts)
        # and asserts gzip compression on backend responses. This catches route/page
        # regressions and compression breakage that escape static analysis.
        steps:
            - name: Checkout
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version-file: package.json

            # Keep the dependency cache safe for the same reason as the quality job above.
            - name: Cache Bun dependencies
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ~/.bun/install/cache
                  key: bun-dl-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-dl-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # bun does not run dependency lifecycle scripts by default, so Puppeteer's
            # bundled Chromium is not fetched during install. Pull it explicitly into
            # the default ~/.cache/puppeteer location the crawler auto-detects.
            - name: Install Puppeteer browser
              run: bunx puppeteer browsers install chrome

            # verify-compression (run by smoke:docker-local) checks the host's
            # frontend/dist for precompressed assets. The docker image builds the
            # frontend internally, so build it on the runner too for that check.
            - name: Build frontend (for compression check)
              run: bun run build:frontend

            # smoke.ts resolves APP_SLUG / FRONTEND_PORT / BACKEND_PORT / APPDATA_ROOT
            # from config defaults and exports them to the compose commands, so the
            # docker-local stack needs no extra environment here.
            - name: Runtime crawl + compression (docker-local)
              run: bun run smoke:docker-local

            # Build the standalone image under a deliberately local-only tag. This proves that
            # derived applications can build the production artifact without publishing it.
            - name: Build local verification image
              run: bun run docker:image:build

            - name: Verify image license inventory
              run: bun run check:image-licenses

            - name: Scan local image with Trivy (gate on CRITICAL/HIGH)
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
              with:
                  image-ref: spernakit-test:latest
                  format: 'table'
                  severity: 'CRITICAL,HIGH'
                  exit-code: '1'
                  ignore-unfixed: true
                  scanners: 'vuln'

            - name: Scan local image with Trivy (report to Security tab)
              if: always()
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
              with:
                  image-ref: spernakit-test:latest
                  format: 'sarif'
                  output: 'trivy-results.sarif'
                  exit-code: '0'
                  ignore-unfixed: true
                  scanners: 'vuln'

            - name: Upload Trivy scan results to GitHub Security
              if: always()
              uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
              with:
                  sarif_file: trivy-results.sarif
                  category: trivy-container

            # The wait-for-http output alone doesn't show why the app crash-looped;
            # surface the container's own logs so runtime failures are diagnosable.
            - name: Dump container logs on failure
              if: failure()
              run: |
                  docker ps -a
                  docker logs spernakit-dev 2>&1 | tail -200 || true

            # Tear down the stack even if the crawl fails so a hung container never
            # masks the real failure. The base compose alone shares the same default
            # project name, so `down` removes the stack without the test override's
            # required APPDATA_ROOT/APP_SLUG vars (unset in this cleanup step).
            - name: Tear down docker-local stack
              if: always()
              run: docker compose -f docker-compose.yml down --remove-orphans || true
