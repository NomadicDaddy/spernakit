name: CI

on:
    push:
        branches: [main]
        tags: ['v*.*.*']
    pull_request:
        branches: [main]

env:
    REGISTRY: ghcr.io

# Workflow-level least-privilege token. Individual jobs that need write scopes
# (e.g. docker-publish → packages:write) opt in via their own `permissions:`
# block. Anything that does not declare permissions inherits `contents: read`.
permissions:
    contents: read

concurrency:
    cancel-in-progress: true
    group: ci-${{ github.ref }}

jobs:
    quality:
        name: Quality Checks
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: 1.3.14

            - name: Cache Bun dependencies
              uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
              with:
                  path: |
                      ~/.bun/install/cache
                      node_modules
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # Parity with scripts/smoke.json mode `qc`. `check:drift` is intentionally
            # omitted: it compares against the spernakit template and is only meaningful
            # in derived apps, not in the template's own CI. `check-deps` and
            # `check:api-types` run in the `build` job (the latter needs build output).
            - name: Config invariants
              run: bun run check:config

            - name: Config schema drift
              run: bun run check:schema-drift

            - name: Config schema validate
              run: bun run config:validate

            - name: Secrets file shape
              run: bun run check:secrets-shape

            - name: Application check
              run: bun run check-application

            - name: Typecheck
              run: bun run typecheck

            - name: Lint
              run: bun run lint

            - name: Feature integration
              run: bun run check:feature-integration

            - name: Schema parity
              run: bun run check:schema-parity

            - name: Format check
              run: bun run format:check

            - name: Process env access check
              run: bun run check:process-env

            - name: Max lines gate
              run: bun run check:max-lines

            - name: Destructive action confirmation check
              run: bun run check:destructive-confirmation

            - name: LTS lockfile freeze guard
              run: bun run check:lockfile-frozen

            - name: LTS surface freeze guard
              run: bun run check:lts-surface

    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: quality

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: 1.3.14

            - name: Cache Bun dependencies
              uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
              with:
                  path: |
                      ~/.bun/install/cache
                      node_modules
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build backend
              run: bun run build:backend

            - name: Build frontend
              run: bun run build:frontend

            # check:api-types reads the built OpenAPI spec; belongs in `build`, not `quality`.
            - name: API types
              run: bun run check:api-types

            - name: Dependency versions
              run: bun run check-deps

    runtime:
        name: Runtime Verification
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: quality

        # Exercises the project's primary RUNTIME verification path, which the
        # static `quality`/`build` jobs do not cover. Brings the full production
        # image up via the docker-local compose (docker/start.sh auto-migrates
        # and seeds a usable SQLite database on first boot, so the server starts
        # in CI with no manual DB setup) and runs `bun run smoke:docker-local`,
        # which crawls every discoverable route with Puppeteer (scripts/crawltest.ts)
        # and asserts gzip compression on backend responses. This catches route/page
        # regressions and compression breakage that escape static analysis.
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: 1.3.14

            - name: Cache Bun dependencies
              uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
              with:
                  path: |
                      ~/.bun/install/cache
                      node_modules
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # bun does not run dependency lifecycle scripts by default, so Puppeteer's
            # bundled Chromium is not fetched during install. Pull it explicitly into
            # the default ~/.cache/puppeteer location the crawler auto-detects.
            - name: Install Puppeteer browser
              run: bunx puppeteer browsers install chrome

            # verify-compression (run by smoke:docker-local) checks the host's
            # frontend/dist for precompressed assets. The docker image builds the
            # frontend internally, so build it on the runner too for that check.
            - name: Build frontend (for compression check)
              run: bun run build:frontend

            # smoke.ts resolves APP_SLUG / FRONTEND_PORT / BACKEND_PORT / APPDATA_ROOT
            # from config defaults and exports them to the compose commands, so the
            # docker-local stack needs no extra environment here.
            - name: Runtime crawl + compression (docker-local)
              run: bun run smoke:docker-local

            # The wait-for-http output alone doesn't show why the app crash-looped;
            # surface the container's own logs so runtime failures are diagnosable.
            - name: Dump container logs on failure
              if: failure()
              run: |
                  docker ps -a
                  docker logs spernakit-dev 2>&1 | tail -200 || true

            # Tear down the stack even if the crawl fails so a hung container never
            # masks the real failure. The base compose alone shares the same default
            # project name, so `down` removes the stack without the test override's
            # required APPDATA_ROOT/APP_SLUG vars (unset in this cleanup step).
            - name: Tear down docker-local stack
              if: always()
              run: docker compose -f docker-compose.yml down --remove-orphans || true

    docker-publish:
        name: Docker Publish
        runs-on: ubuntu-latest
        timeout-minutes: 20
        needs: [quality, build, runtime]
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        permissions:
            contents: read
            packages: write
            security-events: write

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set image name
              run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

            - name: Log in to GHCR
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha,prefix=,format=long
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}

            - name: Build and push Docker image
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # Scan the image we just pushed for CRITICAL/HIGH fixable CVEs.
            # `ignore-unfixed: true` avoids blocking on vulnerabilities without a patched
            # version; `exit-code: 1` fails the job if any fixable CRITICAL/HIGH CVE is found.
            - name: Scan image with Trivy
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
              with:
                  image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                  format: 'sarif'
                  output: 'trivy-results.sarif'
                  severity: 'CRITICAL,HIGH'
                  exit-code: '1'
                  ignore-unfixed: true

            - name: Upload Trivy scan results to GitHub Security
              if: always()
              uses: github/codeql-action/upload-sarif@717e230604b28efc38d8b4d3737d0611b16bc19a # v3.30.0
              with:
                  sarif_file: trivy-results.sarif
                  category: trivy-container
