name: Release

on:
    workflow_run:
        workflows: [CI]
        types: [completed]

# All actions use Node.js 24 natively (checkout v6, setup-bun v2.2).
# Only one release workflow per triggering CI run.
concurrency:
    group: release-${{ github.event.workflow_run.id }}
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    github-release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        timeout-minutes: 10
        # Only create a release when CI succeeds AND the CI run was triggered by a version tag.
        if: >-
            ${{
                github.event.workflow_run.conclusion == 'success' &&
                startsWith(github.event.workflow_run.head_branch, 'v')
            }}

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Create GitHub Release with auto-generated notes
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG_NAME: ${{ github.event.workflow_run.head_branch }}
              run: gh release create "${TAG_NAME}" --generate-notes --verify-tag
