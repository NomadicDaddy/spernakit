[install]
peer = false

# Supply-chain hardening: refuse to install package versions published less
# than 7 days ago (604800 seconds). Compromised releases are usually yanked
# within days; this window keeps a poisoned version from being pulled in by
# a lockfile regeneration before the ecosystem reacts.
#
# DISABLED: under bun 1.3.14 this key blocks resolution of long-published
# pinned versions too (verified locally: `bun install --dry-run` failed on
# @radix-ui/react-avatar@1.1.12 with "blocked by minimum-release-age"),
# which would break fresh installs/CI. Re-enable once a Bun release applies
# the gate only to newly published versions.
# minimumReleaseAge = 604800

# Disable automatic .env file loading - we use JSON config exclusively.
# Note: This does NOT prevent explicit process.env reads in configLoader.ts
# for production secret injection (the only approved use of env vars).
env = false
