worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

# Brotli compression modules (provided by nginx-mod-http-brotli Alpine package).
# Use the absolute /usr/lib path because docker-compose.production.yml mounts a
# tmpfs over /var/lib/nginx, which shadows the package's symlinked module copies
# under /var/lib/nginx/modules/ at runtime and breaks the relative `modules/...`
# load path otherwise.
load_module /usr/lib/nginx/modules/ngx_http_brotli_filter_module.so;
load_module /usr/lib/nginx/modules/ngx_http_brotli_static_module.so;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size ${CLIENT_MAX_BODY_SIZE};

    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Brotli — modern browsers prefer `br` over `gzip` (~15-20% smaller on text).
    # `brotli_static on` serves precompressed `.br` siblings emitted by vite-plugin-compression2.
    brotli on;
    brotli_static on;
    brotli_comp_level 5;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limiting zones for defense-in-depth (backend also has application-level limits)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Shared CSP policy — kept in sync with backend/src/plugins/securityHeaders.ts strict CSP.
    # Single definition prevents drift between /assets/ and SPA fallback blocks.
    # DEFERRED: style-src 'unsafe-inline' required for Radix UI inline style injection.
    # Remove when Radix supports CSP-compatible styles (nonce or no inline styles).
    map $uri $csp_policy {
        default "default-src 'self'; script-src 'self' 'sha256-Iv7srDSoOnDH3hHGa4+d2uupeV5QEc+dDe2mrrrUZZc='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; font-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'none'; frame-ancestors 'none'";
    }

    upstream backend {
        server 127.0.0.1:${BACKEND_PORT};
        keepalive 16;
    }

    server {
        listen ${FRONTEND_PORT};
        server_name _;
        absolute_redirect off;

        # Connection limit per IP
        limit_conn conn 50;
        limit_conn_status 429;
        root /app/frontend/dist;
        index index.html;

        # Custom error pages for backend unavailability
        error_page 502 503 504 /50x.html;
        
        location = /50x.html {
            internal;
            default_type text/html;
            return 503 '<!DOCTYPE html><html><head><title>Service Unavailable</title></head><body style="font-family:system-ui,sans-serif;padding:40px;text-align:center"><h1>Service Temporarily Unavailable</h1><p>The application is currently unavailable. Please try again in a few moments.</p><p><small>Error code: 503</small></p></body></html>';
        }

        # API proxy
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # $scheme is always 'http' inside the container because TLS is terminated
            # by an external reverse proxy (Caddy, Traefik, nginx-proxy-manager).
            # Forward the external proxy's X-Forwarded-Proto so the backend knows
            # the original protocol (important for cookie secure flag, OAuth, CORS, HSTS).
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout;
        }

        # WebSocket proxy
        location /ws {
            limit_req zone=api burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Forward external proxy's X-Forwarded-Proto (see /api/ block comment)
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Frontend static files with cache headers
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy no-referrer always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy $csp_policy always;
        }

        # SPA fallback - all other routes serve index.html
        # Security headers for static HTML responses (API responses get headers from backend)
        location / {
            try_files $uri $uri/ /index.html;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy no-referrer always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy $csp_policy always;
            # Revalidate index.html on every navigation so content-hashed asset references
            # never go stale after a deploy. Hashed files under /assets/ keep their 1y immutable policy.
            add_header Cache-Control "no-cache" always;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
